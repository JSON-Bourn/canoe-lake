<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canoe Lake</title>
  <link rel="stylesheet" href="https://code.jquery.com/ui/1.14.2/themes/base/jquery-ui.css">
  <link rel="stylesheet" href="./resources/demos/style.css">
  <link rel="stylesheet" href="./css/styles.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/Draggable.min.js"></script>
  <script src="./scripts/main.js"></script>
  <script type="module" src="./scripts/drag.js"></script>

</head>
<body>
  <header>
    <nav class="nav-bar">
      <ul class="nav-list">
        <li>
          <h3>
            <a href="./canoe-lake-camera-view.html">Investigate</a>
          </h3>
        </li>
        <li>
          <h3>
            <a href="./solve-chapter-select.html">Solve</a>
          </h3>
        </li>
        <li>
          <h3>
            <a href="./credits.html">Credits</a>
          </h3>
        </li>
      </ul>
    </nav>
  </header>

  <h1 id="h1-full-story">Solve Full Story</h1>
<section class="main">
  <div class="fragment-grid">
    <div id="s1" class="grid-cell">1</div>
    <div id="s2" class="grid-cell">2</div>
    <div id="s3" class="grid-cell">3</div>
  </div>
  <div class="card-start">
    <div id=c2 class="draggable drag-card">The Lodge</div>
    <div id=c3 class="draggable drag-card">Shoreline</div>
    <div id=c1 class="draggable drag-card">The Lake</div>
  </div>
  <div class="solve-controls">
    <button class="reset controls">Reset</button>
    <button class="progress controls">Progress</button>
    <button class="solve controls inactive">Solve</button>
  </div>
</section>

<dialog id="progress" class="modal">
  <div class="modal-container">
    <h2 id="dialog-full-story">Solve Progress</h2>
    <ul>
      <li>
        <p>
          The Lodge: <span class="chapter2Progress">Unsolved</span>
        </p>
      </li>
      <li>
        <p>
          Shoreline: <span class="chapter3Progress">Unsolved</span>
        </p>
      </li>
      <li>
        <p>
          The Lake: <span class="chapter1Progress">Unsolved</span>
        </p>
      </li>
    </ul>
    <div class="modal-controls solve-controls">
      <button id="closeProgress">Close</button>
      <a href="canoe-lake-epilogue.html" id="epilogue-btn" class="glowing">
        Proceed to the Epilogue
      </a>
    </div>

    <!-- <button id="makeCookie">Save</button>
    <button id="printCookie">Load</button> -->
  </div>
</dialog>

<!-- <button class="shuffle">Shuffle Cards</button> -->






</body>
</html>
