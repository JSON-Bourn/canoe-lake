<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canoe Lake Camera View</title>
  <link rel="stylesheet" href="./css/styles.css">
</head>

<body class="camera-view">

  <header>
    <nav class="nav-bar">
      <ul class="nav-list">
        <li><a href="./canoe-lake-camera-view.html">Investigate</a></li>
        <li><a href="./">Solve</a></li>
      </ul>
    </nav>
  </header>

  <div class="container">

    <div class="title">CAMERA VIEW</div>

    <div class="camera-preview">
      <div id="reader"></div>
    </div>

    <div class="camera-btn-container">
      <button id="startBtn" class="begin-btn">OPEN CAMERA</button>
      <button id="stopBtn" class="begin-btn" disabled>STOP CAMERA</button>
      <button id="restartBtn" class="begin-btn" disabled>RESTART CAMERA</button>
    </div>

    <div class="instructions">
      <p>Scan a Fragment With Your Camera.</p>
      <p>If live scan does not detect, open and scan with your phone's native camera app, or use a photo of the QR code:</p>
      <input id="fileInput" type="file" accept="image/*" capture="environment">
    </div>

    <p id="result" class="camera-scan-result" aria-live="polite">
      Tap OPEN CAMERA to scan a QR code.
    </p>

    <a id="scanLink" class="begin-btn" href="#" hidden>
      OPEN SCANNED PAGE
    </a>

  </div>

  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="./scripts/camera-view.js"></script>

</body>
</html>
