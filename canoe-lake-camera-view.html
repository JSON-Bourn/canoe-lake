<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Scanner</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #111;
      color: #fff;
    }

    #reader {
      width: 100%;
      max-width: 500px;
      margin: 20px auto;
    }

    button {
      padding: 12px 20px;
      margin: 10px;
      font-size: 16px;
    }
  </style>
</head>
<body>

  <h2>QR Scanner</h2>

  <div id="reader"></div>

  <div>
    <button id="startBtn">START CAMERA</button>
    <button id="stopBtn" disabled>STOP CAMERA</button>
  </div>

  <p id="result">Tap START CAMERA</p>

  <!-- REQUIRED library -->
  <script src="https://unpkg.com/html5-qrcode"></script>

  <!-- Your script -->
  <script src="./scripts/camera-view.js"></script>

</body>
</html>
