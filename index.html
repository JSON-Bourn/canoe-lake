  <link rel="stylesheet" href="./css/styles.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/Draggable.min.js"></script>
  <script src="./scripts/main.js"></script>
  <script type="module" src="./scripts/drag.js"></script>

</head>
<body>
  <header>
    <h2 id="logo">Canoe Lake</h2>
    <nav class="nav-bar">
      <ul class="nav-list">
        <li>
          <h3>
            <a href="./">Solve</a>
          </h3>

        <li>
          <h3>
            <a href="./template.html">Fragment</a>

          </h3>
        </li>
      </ul>

  </header>

  <h1>Drag to Solve</h1>
<section class="main">
  <div class="fragment-grid">
    <div id="s1" class="grid-cell">F1</div>
    <div id="s2" class="grid-cell">F2</div>
    <div id="s3" class="grid-cell">F3</div>
  </div>
  <div class="card-start">
    <div id=f1 class="draggable drag-card">jack pine</div>
    <div id=f2 class="draggable drag-card">empty cabin</div>
    <div id=f3 class="draggable drag-card">woman weeping</div>
    <div id=f4 class="draggable drag-card">camp fire</div>
    <div id=f5 class="draggable drag-card">bottle</div>
    <div id=f6 class="draggable drag-card">lake splash</div>
    <div id=f7 class="draggable drag-card">raised fists</div>
    <div id=f8 class="draggable drag-card">red canoe</div>
    <div id=f9 class="draggable drag-card">oar</div>
  </div>
  <div class="controls">
    <button class="reset controls">Reset</button>
    <button class="solve controls inactive">Solve Chapter</button>
  </div>
</section>
